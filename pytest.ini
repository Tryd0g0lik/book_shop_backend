;https://docs.pytest.org/en/stable/reference/reference.html#configuration-options
[pytest]
minversion = 8.4.1
;DJANGO_SETTINGS_MODULE = backend.settings

python_files = tests.py test_*.py *_tests.py
python_functions = test_*

pythonpath = ["person",]


# Пути к тестам (исправлен синтаксис)
testpaths =
    __tests__

# Исключаемые пути (исправлен синтаксис)
norecursedirs =
    *env
    ?/migrations/?
    apps
    project
    metaimage/?
    ?/models.?
    ?/project/?
    ??tamplates/?




# Опции командной строки (исправлено)
addopts =
  --maxfail=2
  --tb=short -v
  --runxfail
  --failed-first
  --cache-clear
  --log-file-level=DEBUG
  --log-file=__tests__/pytest-logs.log
  --log-file-format="[%(asctime)s.%(msecs)03d] %(levelname)s - %(name)s:%(lineno)d -  [%(filename)s:%(lineno)d] - %(message)s"
  --log-file-date-format="[%Y-%m-%d %H:%M:%S]"
  --strict-markers
  --reuse-db
  --ds=project.settings
  --cov=./persons
  --cov-fail-under=80

;  '--cov' & ''--cov-report'  вывод в консоль - покрытие тестом
# Настройки вывода (не все параметры поддерживаются)
console_output_style = classic

# Настройки asyncio
asyncio_mode = auto
asyncio_default_fixture_loop_scope = module


markers =
    invalid
    create_valid
    active_valid


